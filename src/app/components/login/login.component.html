<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="form-control"
          [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <small *ngIf="loginForm.get('email')?.hasError('required')">Email is required</small>
          <small *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</small>
          <small *ngIf="loginForm.get('email')?.hasError('whitespace')">Email cannot contain whitespace</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          class="form-control"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          <small *ngIf="loginForm.get('password')?.hasError('required')">Password is required</small>
          <small *ngIf="loginForm.get('password')?.hasError('minlength')">Password must be at least 6 characters</small>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
        Login
      </button>

      <div class="signup-link">
        Don't have an account? <a routerLink="/signup">Sign up</a>
      </div>
    </form>

    <div class="success-message" *ngIf="loginSuccess">
      Login successful! Redirecting...
    </div>
  </div>
</div>
