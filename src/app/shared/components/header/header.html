<header class="header">
  <div class="header__left">
    <span class="header__logo" routerLink="/">Fake<span>Store</span></span>
    <nav class="header__nav">
      <a routerLink="/products">Products</a>
      @if (isAdmin()) {
        <a routerLink="/dashboard">Dashboard</a>
      }
      <a routerLink="/about">About</a>
      <a routerLink="/contact-us">Contact us</a>
    </nav>
  </div>

  <div class="header__right">
    <app-search-bar />

    <div class="header__actions">
      @if (isAuthenticated()) {
        <app-profile-dropdown />
      } @else {
        <button class="header__action-btn" routerLink="/login">Sign In</button>
      }

      <button class="header__action-btn" (click)="cartOpen.set(!cartOpen())" aria-label="Open cart">
        <img src="icons/cart-icon.svg" alt="Cart" />
        @if (cart.totalItems() > 0) {
          <span class="header__badge">{{ cart.totalItems() }}</span>
        }
      </button>
      <app-cart-drawer [isOpen]="cartOpen()" (closed)="cartOpen.set(false)" />
    </div>
  </div>
</header>
