<header class="header">
  <div class="header__left">
    <span class="header__logo" routerLink="/">Fake Store</span>
    <nav class="header__nav">
      <a routerLink="/products">Products</a>
      @if (isAdmin()) {
        <a routerLink="/dashboard">Dashboard</a>
      }
      <a routerLink="/about">About</a>
      <a routerLink="/contact-us">Contact us</a>
    </nav>
  </div>

  <div class="header__right">
    <div class="header__search">
      <input type="text" placeholder="Value" [(ngModel)]="searchValue" />
      <button class="header__search-btn" (click)="onSearch()">
        <img src="icons/search-icon.svg" alt="Search" />
      </button>
    </div>

    <div class="header__actions">
      @if (isAuthenticated()) {
        <app-profile-dropdown />
      } @else {
        <button class="header__action-btn" routerLink="/login">Sign In</button>
      }

      <button class="header__action-btn">
        <img src="icons/cart-icon.svg" alt="Cart" />
      </button>
    </div>
  </div>
</header>
