<div class="profile-dropdown" [class.profile-dropdown--open]="isOpen()">
  <button
    class="profile-trigger"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="true"
    aria-label="Account menu"
  >
    <div class="profile-trigger__avatar">
      <img src="icons/profile-icon.svg" alt="" aria-hidden="true" />
    </div>
    <svg
      class="profile-trigger__caret"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
    >
      <path d="M6 9l6 6 6-6" />
    </svg>
  </button>

  @if (isOpen()) {
    <div class="dropdown" role="menu" aria-label="User menu">
      <div class="dropdown__header">
        <div class="dropdown__avatar">
          <img [src]="image()" alt="" aria-hidden="true" />
        </div>
        <div class="dropdown__user-info">
          <span class="dropdown__username">&#64;{{ username() }}</span>
          <span class="dropdown__badge">{{ role() }}</span>
        </div>
      </div>

      <div class="dropdown__divider"></div>

      <button class="dropdown__item" routerLink="/profile" role="menuitem" (click)="close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>My Profile</span>
        <svg
          class="dropdown__item-arrow"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>

      <div class="dropdown__divider"></div>

      <button class="dropdown__item dropdown__item--danger" role="menuitem" (click)="signOut()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span>Sign Out</span>
      </button>
    </div>
  }
</div>
