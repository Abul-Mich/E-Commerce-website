<div class="profile-dropdown" [class.profile-dropdown--open]="isOpen()">
  <button
    class="profile-trigger"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="true"
    aria-label="Account menu"
  >
    <div class="profile-trigger__avatar">
      <img src="icons/profile-icon.svg" alt="" aria-hidden="true" />
    </div>
    <span class="material-icons profile-trigger__caret mi-caret">expand_more</span>
  </button>

  @if (isOpen()) {
    <div class="dropdown" role="menu" aria-label="User menu">
      <div class="dropdown__header">
        <div class="dropdown__avatar">
          <img [src]="image()" alt="" aria-hidden="true" />
        </div>
        <div class="dropdown__user-info">
          <span class="dropdown__username">&#64;{{ username() }}</span>
          <span class="dropdown__badge">{{ role() }}</span>
        </div>
      </div>

      <div class="dropdown__divider"></div>

      <button class="dropdown__item" routerLink="/profile" role="menuitem" (click)="close()">
        <span class="material-icons mi-menu">person</span>
        <span>My Profile</span>
        <span class="material-icons dropdown__item-arrow mi-arrow">chevron_right</span>
      </button>

      <div class="dropdown__divider"></div>

      <button class="dropdown__item dropdown__item--danger" role="menuitem" (click)="signOut()">
        <span class="material-icons mi-menu">logout</span>
        <span>Sign Out</span>
      </button>
    </div>
  }
</div>
