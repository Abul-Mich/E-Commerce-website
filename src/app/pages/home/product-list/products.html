<div class="products-container">
  <div class="header">
    <h2>Products</h2>
    <span class="products-count">{{ sortedProducts().length }} items</span>
  </div>

  <div class="products-grid" [class.products-grid--list]="viewMode() === 'list'">
    @for (product of paginatedProducts(); track product.id) {
      <app-product-card [product]="product" [viewMode]="viewMode()" />
    }

    @if (paginatedProducts().length === 0) {
      <div class="products-empty">
        <p>No products match your filters.</p>
      </div>
    }
  </div>

  @if (totalPages() > 1) {
    <div class="pagination">
      <button
        class="pagination__btn pagination__btn--arrow"
        [disabled]="currentPage() === 1"
        (click)="goToPage(currentPage() - 1)"
        aria-label="Previous page"
      >
        <span class="material-icons mi-page">chevron_left</span>
      </button>

      @for (page of pageNumbers(); track page) {
        <button
          class="pagination__btn"
          [class.pagination__btn--active]="currentPage() === page"
          (click)="goToPage(page)"
        >
          {{ page }}
        </button>
      }

      <button
        class="pagination__btn pagination__btn--arrow"
        [disabled]="currentPage() === totalPages()"
        (click)="goToPage(currentPage() + 1)"
        aria-label="Next page"
      >
        <span class="material-icons mi-page">chevron_right</span>
      </button>
    </div>
  }
</div>
